---
- name: Install Podman and dependencies
  ansible.builtin.dnf:
    name:
      - podman
      - python3-pip
      - python3-podman
      - git
      - unzip
      - python3-dnf
    state: present
    update_cache: true

- name: Create SELinux directory context for container volumes
  community.general.sefcontext:
    target: "{{ item }}(/.*)?"
    setype: container_file_t
    state: present
  with_items:
    - "{{ mattermost_data_dir }}"
    - "{{ mattermost_config_dir }}"
    - "{{ mattermost_logs_dir }}"
    - "{{ mattermost_plugins_dir }}"
    - "{{ mattermost_client_plugins_dir }}"
    - "{{ mattermost_bleve_indexes_dir }}"
    - "{{ mattermost_postgres_data_dir }}"
  register: sefcontext_result

- name: Create Mattermost parent directory
  ansible.builtin.file:
    path: /opt/mattermost
    state: directory
    mode: '0755'

- name: Run restorecon after changing SELinux context
  ansible.builtin.command: restorecon -Rv /opt/mattermost
  when: sefcontext_result.changed

- name: Create Mattermost directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: 2000
    group: 2000
    mode: '0755'
  with_items:
    - "{{ mattermost_data_dir }}"
    - "{{ mattermost_config_dir }}"
    - "{{ mattermost_logs_dir }}"
    - "{{ mattermost_plugins_dir }}"
    - "{{ mattermost_client_plugins_dir }}"
    - "{{ mattermost_bleve_indexes_dir }}"
    - "{{ mattermost_postgres_data_dir }}"

# - name: Create temporary directory for GitHub clone
#   ansible.builtin.file:
#     path: /tmp/mattermost_backup
#     state: directory
#     mode: '0755'

# - name: Clone GitHub repository to get backup file
#   ansible.builtin.git:
#     repo: "https://{{ mattermost_github_repo }}"
#     dest: /tmp/mattermost_backup
#     force: true

- name: Copy backup file to local path
  ansible.builtin.copy:
    src: "{{ mattermost_backup_file }}"
    dest: "{{ mattermost_local_backup_path }}"
    mode: '0644'
  register: backup_copied

- name: Create Podman network
  containers.podman.podman_network:
    name: "{{ mattermost_container_network }}"
    state: present
  register: network_result

- name: Deploy PostgreSQL container
  containers.podman.podman_container:
    name: mattermost-postgres
    image: docker.io/library/postgres:13
    restart_policy: always
    network: "{{ mattermost_container_network }}"
    env:
      POSTGRES_USER: "{{ mattermost_postgres_user }}"
      POSTGRES_PASSWORD: "{{ mattermost_postgres_password }}"
      POSTGRES_DB: "{{ mattermost_postgres_db }}"
    volume:
      - "{{ mattermost_postgres_data_dir }}:/var/lib/postgresql/data:Z"
    state: started

- name: Wait for PostgreSQL to be ready
  ansible.builtin.command:
    cmd: podman exec mattermost-postgres pg_isready -U {{ mattermost_postgres_user }}
  register: pg_ready
  retries: 30
  delay: 5
  until: pg_ready.rc == 0
  changed_when: false

- name: Deploy Mattermost container
  containers.podman.podman_container:
    name: mattermost
    image: "docker.io/mattermost/mattermost-team-edition:{{ mattermost_version }}"
    restart_policy: always
    network: "{{ mattermost_container_network }}"
    ports:
      - "8065:8065"
    env:
      MM_SERVICESETTINGS_ENABLELOCALMODE: "true"
      MM_USERNAME: "{{ mattermost_postgres_user }}"
      MM_PASSWORD: "{{ mattermost_postgres_password }}"
      MM_DBNAME: "{{ mattermost_postgres_db }}"
      MM_SQLSETTINGS_DATASOURCE: "postgres://{{ mattermost_postgres_user }}:{{ mattermost_postgres_password | urlencode }}@mattermost-postgres:5432/{{ mattermost_postgres_db }}?sslmode=disable&connect_timeout=10"
      MM_SERVICESETTINGS_SITEURL: "{{ mattermost_mm_site_url }}"
    volume:
      - "{{ mattermost_config_dir }}:/mattermost/config:z"
      - "{{ mattermost_data_dir }}:/mattermost/data:z"
      - "{{ mattermost_logs_dir }}:/mattermost/logs:z"
      - "{{ mattermost_plugins_dir }}:/mattermost/plugins:z"
      - "{{ mattermost_client_plugins_dir }}:/mattermost/client/plugins:z"
      - "{{ mattermost_bleve_indexes_dir }}:/mattermost/bleve-indexes:z"
    state: started

- name: Wait for Mattermost container to initialize
  ansible.builtin.pause:
    seconds: 15

- name: Wait for Mattermost to be ready
  ansible.builtin.uri:
    url: "http://localhost:8065/api/v4/system/ping"
    return_content: true
  register: mm_ping
  retries: 30
  delay: 10
  until: mm_ping.status == 200
  delegate_to: "{{ inventory_hostname }}"
  ignore_errors: true

- name: Get Mattermost container logs on failure
  ansible.builtin.command: podman logs --tail 30 mattermost
  register: mm_logs
  changed_when: false
  when: mm_ping is failed

- name: Show Mattermost logs and fail
  ansible.builtin.fail:
    msg: |
      Mattermost failed to start. Container logs:
      {{ mm_logs.stdout }}
  when: mm_ping is failed

- name: Create initial admin via Mattermost API (first user is auto-promoted to system admin)
  ansible.builtin.uri:
    url: "http://localhost:8065/api/v4/users"
    method: POST
    body_format: json
    body:
      email: "admin@ansible.com"
      username: "admin"
      password: "{{ mattermost_admin_password }}"
    status_code: [200, 201]

- name: Authenticate mmctl with API credentials
  containers.podman.podman_container_exec:
    name: mattermost
    command: "mmctl auth login http://localhost:8065 --name local --username admin --password {{ mattermost_admin_password }}"

- name: Copy backup file into Mattermost container
  containers.podman.podman_container_copy:
    src: "{{ mattermost_local_backup_path }}"
    dest: /tmp/backup.zip
    container: mattermost
  retries: 3
  delay: 10
  register: copy_result
  until: copy_result is not failed

- name: Configure Mattermost after deployment
  block:
    - name: Import mattermost config
      containers.podman.podman_container_exec:
        name: mattermost
        command: "mmctl import process --bypass-upload /tmp/backup.zip"
      register: import_process

    - name: Wait for import job to complete
      containers.podman.podman_container_exec:
        name: mattermost
        command: "mmctl import job list"
      register: import_jobs
      retries: 30
      delay: 10
      until: >-
        import_jobs.stdout is search("status[:] success")
        or import_jobs.stdout is search("pending")
        and not (import_jobs.stdout is search("status[:] in_progress"))
      changed_when: false
      failed_when: import_jobs.stdout is search("status[:] error")

    - name: Wait for import data to settle
      ansible.builtin.pause:
        seconds: 15

    - name: Create ansibleadmin user
      containers.podman.podman_container_exec:
        name: mattermost
        command: "mmctl user create --email ansibleadmin@ansible.com --username ansibleadmin --password {{ mattermost_admin_password }} --system-admin"
      register: import_result

    - name: Add admin to team
      containers.podman.podman_container_exec:
        name: mattermost
        command: "mmctl team add automators ansibleadmin@ansible.com"
      retries: 6
      delay: 10
      register: team_add
      until: team_add.rc == 0

    - name: List channels in automators team
      containers.podman.podman_container_exec:
        name: mattermost
        command: "mmctl channel list automators"
      retries: 3
      delay: 5
      register: channel_list
      until: channel_list.rc == 0

    - name: Get Mattermost Channel ID
      containers.podman.podman_container_exec:
        name: mattermost
        command: "mmctl channel search town-square"
      register: channel_output

    - name: Extract Channel ID
      ansible.builtin.set_fact:
        channel_id: "{{ channel_output.stdout_lines | select('search', 'Channel ID') | map('regex_replace', '^.*Channel ID :', '') | first }}"

- name: Setup Incoming Webhook
  block:

    - name: Create Incoming Webhook
      containers.podman.podman_container_exec:
        name: mattermost
        command: "mmctl webhook create-incoming --channel {{ channel_id }} --user admin --display-name Incoming Webhook --lock-to-channel"

    - name: List webhook
      containers.podman.podman_container_exec:
        name: mattermost
        command: "mmctl webhook list"
      register: webhook_list

    - name: Show webhook details
      ansible.builtin.debug:
        var: webhook_list

    - name: Extract token from stdout using regex
      ansible.builtin.set_fact:
        mattermost_incoming_token: "{{ webhook_list.stdout | regex_search('\\((.*?)\\)', '\\1') | first }}"

    - name: Debug the token
      ansible.builtin.debug:
        msg: "Token: {{ mattermost_incoming_token }}"


- name: Create systemd service files for Docker containers
  block:
    - name: Create systemd service directory
      ansible.builtin.file:
        path: /etc/systemd/system
        state: directory
        mode: '0755'

    - name: Create systemd service for PostgreSQL container
      ansible.builtin.template:
        src: templates/podman-container.service.j2
        dest: /etc/systemd/system/podman-mattermost-postgres.service
        mode: '0644'
      vars:
        container_name: "mattermost-postgres"
      register: postgres_service

    - name: Create systemd service for Mattermost container
      ansible.builtin.template:
        src: templates/podman-container.service.j2
        dest: /etc/systemd/system/podman-mattermost.service
        mode: '0644'
      vars:
        container_name: mattermost
      register: mattermost_service

    - name: Reload systemd if services changed
      ansible.builtin.systemd:
        daemon_reload: true
      when: postgres_service.changed or mattermost_service.changed

    - name: Enable systemd services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      with_items:
        - podman-mattermost-postgres.service
        - podman-mattermost.service
  vars:
    systemd_dir: /etc/systemd/system
  ignore_errors: true
