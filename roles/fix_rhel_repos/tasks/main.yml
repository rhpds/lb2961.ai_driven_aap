---
# Disable satellite repos on RHEL nodes so they don't interfere with
# role-specific repos (e.g. Elastic for filebeat).
#
# These nodes only need the Elastic repo. Rather than calling
# subscription-manager (which hits the shared satellite capsule HA
# and can disrupt other hosts), we disable repos locally in dnf config.

- name: Disable satellite repos locally (no subscription-manager calls)
  ansible.builtin.command: >-
    dnf config-manager --disable
    rhel-9-for-x86_64-baseos-rpms
    rhel-9-for-x86_64-appstream-rpms
  register: _disable_repos
  changed_when: _disable_repos.rc == 0
  failed_when: false
