---
# Fix satellite CA vs CDN SSL mismatch on RHEL nodes.
# set-repositories re-registers to CDN but keeps the satellite katello
# CA cert which cannot validate CDN SSL. Disabling sslverify allows
# dnf to work with the CDN repos.

- name: Fix repo SSL verification on nodes (satellite CA vs CDN mismatch)
  ansible.builtin.command:
    cmd: bash -c 'sed -i "s/sslverify = 1/sslverify = 0/g" /etc/yum.repos.d/redhat.repo'
  changed_when: true
  failed_when: false

- name: Set sslverify=0 globally in dnf.conf
  ansible.builtin.lineinfile:
    path: /etc/dnf/dnf.conf
    line: "sslverify=0"
    regexp: "^sslverify"
    state: present
