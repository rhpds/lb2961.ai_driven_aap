---
# MCP server configuration for AAP integration
# Set continue_dev_mcp_enabled to true to configure MCP servers in Continue.dev
continue_dev_mcp_enabled: false

# MCP mode: "standalone" (local container) or "remote" (npx mcp-remote to AAP gateway)
continue_dev_mcp_mode: standalone

# Standalone mode: local MCP server container on bastion
# Uses npx mcp-remote to bridge streamable-http to stdio
continue_dev_mcp_port: 8448

# Remote mode: AAP MCP gateway host (for npx mcp-remote over https)
continue_dev_mcp_gateway_host: ""

# AAP gateway token (must be created before calling this role)
continue_dev_mcp_token: ""

# nvm and Node.js versions (for npx mcp-remote)
continue_dev_nvm_version: "0.40.1"
continue_dev_node_version: "20"

# Red Hat Lightspeed MCP (Insights: Advisor, Vulnerability, Remediation, etc.)
continue_dev_lightspeed_mcp_enabled: false
continue_dev_lightspeed_mcp_port: 8000
continue_dev_lightspeed_mcp_client_id: ""
continue_dev_lightspeed_mcp_client_secret: ""
