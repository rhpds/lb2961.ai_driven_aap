---
- name: Configure git settings
  become_user: "{{ student_name }}"
  community.general.git_config:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    scope: global
  loop:
    - { name: "credential.helper", value: "store" }
    - { name: "user.name", value: "{{ student_name }}" }
    - { name: "user.email", value: "{{ student_name }}@lab.example.com" }
    - { name: "http.sslVerify", value: "false" }

- name: Place git credentials file
  ansible.builtin.copy:
    content: "https://{{ student_name }}:{{ common_password }}@{{ ansible_dev_env_gitea_hostname }}\n"
    dest: "/home/{{ student_name }}/.git-credentials"
    owner: "{{ student_name }}"
    mode: "0600"

- name: Check Gitea is reachable before cloning
  ansible.builtin.uri:
    url: "https://{{ ansible_dev_env_gitea_hostname }}"
    validate_certs: false
    timeout: 10
  register: _gitea_check
  failed_when: false

- name: Clone lightspeed_playbooks repo
  become_user: "{{ student_name }}"
  ansible.builtin.command:
    cmd: >-
      git clone https://{{ student_name }}:{{ common_password }}@{{ ansible_dev_env_gitea_hostname }}/{{ student_name }}/{{ ansible_dev_env_git_repo_name }}.git
      {{ ansible_dev_env_repo_path }}
    creates: "{{ ansible_dev_env_repo_path }}"
  environment:
    GIT_SSL_NO_VERIFY: "true"
    GIT_TERMINAL_PROMPT: "0"
    HOME: "/home/{{ student_name }}"
  timeout: 60
  when: _gitea_check.status | default(0) == 200
  ignore_errors: true
  no_log: true
