---
- name: Upgrade pip in venv
  become_user: "{{ student_name }}"
  ansible.builtin.pip:
    name: pip
    state: latest
    virtualenv: "{{ ansible_dev_env_venv_path }}"

- name: Install CrewAI packages in venv
  become_user: "{{ student_name }}"
  ansible.builtin.pip:
    name: "{{ ansible_dev_env_crewai_pip_packages }}"
    virtualenv: "{{ ansible_dev_env_venv_path }}"

- name: Find chromadb init file for sqlite3 patch
  ansible.builtin.find:
    paths: "{{ ansible_dev_env_venv_path }}/lib64"
    patterns: "__init__.py"
    recurse: true
    contains: "import chromadb"
  register: _chromadb_init
  failed_when: false

- name: Patch chromadb to use pysqlite3 (RHEL sqlite3 too old)
  when: _chromadb_init.files | length > 0
  ansible.builtin.lineinfile:
    path: "{{ _chromadb_init.files[0].path }}"
    insertbefore: BOF
    line: "import pysqlite3; import sys; sys.modules['sqlite3'] = pysqlite3"

- name: Create CrewAI agent directory
  ansible.builtin.file:
    path: "/home/{{ student_name }}/agentic-aiops"
    state: directory
    owner: "{{ student_name }}"
    mode: "0755"

- name: Deploy incident agent script
  ansible.builtin.template:
    src: incident_agent.py.j2
    dest: "/home/{{ student_name }}/agentic-aiops/incident_agent.py"
    owner: "{{ student_name }}"
    mode: "0755"

- name: Create AAP gateway token for CrewAI MCP authentication
  when: ai_client_mcp_token | default('') | length == 0
  environment:
    GATEWAY_HOSTNAME: "{{ ansible_automation_platform_configuration_host }}"
    GATEWAY_USERNAME: "{{ ansible_automation_platform_configuration_username }}"
    GATEWAY_PASSWORD: "{{ ansible_automation_platform_configuration_password }}"
    GATEWAY_VERIFY_SSL: "{{ ansible_automation_platform_configuration_verify_ssl }}"
  ansible.platform.token:
    description: CrewAI MCP server authentication token
    scope: write
    state: present
  register: _crewai_token_result
  until: _crewai_token_result is not failed
  retries: 30
  delay: 10

- name: Set MCP token from gateway response
  when:
    - _crewai_token_result is defined
    - _crewai_token_result is not skipped
  ansible.builtin.set_fact:
    ai_client_mcp_token: "{{ _crewai_token_result.ansible_facts.aap_token.token }}"

- name: Set CrewAI MCP environment in .bashrc
  ansible.builtin.blockinfile:
    path: "/home/{{ student_name }}/.bashrc"
    marker: "# {mark} CREWAI MCP ENV"
    block: |
      export MCP_BASE_URL="http://localhost:{{ ai_client_mcp_port | default('8448') }}"
      export MCP_TOKEN="{{ ai_client_mcp_token | default('') }}"
      export CREWAI_TRACING_ENABLED=false
    owner: "{{ student_name }}"

- name: Create CrewAI config directory
  ansible.builtin.file:
    path: "/home/{{ student_name }}/.crewai"
    state: directory
    owner: "{{ student_name }}"
    mode: "0755"

- name: Disable CrewAI tracing preference
  ansible.builtin.copy:
    content: '{"tracing_disabled": true}'
    dest: "/home/{{ student_name }}/.crewai/telemetry_preference.json"
    owner: "{{ student_name }}"
    mode: "0644"
