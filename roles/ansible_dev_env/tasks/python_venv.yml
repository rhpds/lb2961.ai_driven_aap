---
- name: Check if preferred Python is already installed
  ansible.builtin.stat:
    path: "{{ ansible_dev_env_python_bin }}"
  register: _preferred_python

- name: Install Python from repos
  when: not _preferred_python.stat.exists
  block:
    - name: Clean dnf cache before Python install
      ansible.builtin.command: dnf clean all
      changed_when: true

    - name: "Install {{ ansible_dev_env_python_package }} RPMs"
      ansible.builtin.dnf:
        name:
          - "{{ ansible_dev_env_python_package }}"
          - "{{ ansible_dev_env_python_package }}-pip"
          - "{{ ansible_dev_env_python_package }}-devel"
        state: present
      register: _python_install
      until: _python_install is not failed
      retries: 3
      delay: 30

  rescue:
    - name: "Try python3.11 as fallback (CrewAI requires >= 3.10)"
      ansible.builtin.dnf:
        name:
          - python3.11
          - python3.11-pip
          - python3.11-devel
        state: present
      register: _python311_install
      until: _python311_install is not failed
      retries: 2
      delay: 30
      failed_when: false

    - name: Set python3.11 as interpreter
      when: _python311_install is not failed
      ansible.builtin.set_fact:
        ansible_dev_env_python_bin: /usr/bin/python3.11

    - name: Install standalone Python from GitHub when repos unavailable
      when: _python311_install is failed
      ansible.builtin.shell:
        cmd: |
          set -e
          PY_VER="{{ ansible_dev_env_standalone_python_version | default('3.12.11') }}"
          PY_MAJOR="${PY_VER%.*}"
          INSTALL_DIR="/opt/python${PY_VER}"
          RELEASE="20250604"
          TARBALL="cpython-${PY_VER}+${RELEASE}-x86_64-unknown-linux-gnu-install_only_stripped.tar.gz"
          URL="https://github.com/astral-sh/python-build-standalone/releases/download/${RELEASE}/${TARBALL}"

          curl -sSL -o /tmp/python-standalone.tar.gz "${URL}"
          mkdir -p "${INSTALL_DIR}"
          tar xzf /tmp/python-standalone.tar.gz -C "${INSTALL_DIR}" --strip-components=1
          rm -f /tmp/python-standalone.tar.gz

          ln -sf "${INSTALL_DIR}/bin/python${PY_MAJOR}" "/usr/local/bin/python${PY_MAJOR}"
          ln -sf "${INSTALL_DIR}/bin/pip${PY_MAJOR}" "/usr/local/bin/pip${PY_MAJOR}"
        creates: /usr/local/bin/python3.12

    - name: Set standalone python as interpreter
      when: _python311_install is failed
      ansible.builtin.set_fact:
        ansible_dev_env_python_bin: /usr/local/bin/python3.12

- name: Create Python virtual environment
  become_user: "{{ student_name }}"
  ansible.builtin.command:
    cmd: "{{ ansible_dev_env_python_bin }} -m venv {{ ansible_dev_env_venv_path }}"
    creates: "{{ ansible_dev_env_venv_path }}/bin/python3"

- name: Upgrade pip in venv
  become_user: "{{ student_name }}"
  ansible.builtin.pip:
    name: pip
    state: latest
    virtualenv: "{{ ansible_dev_env_venv_path }}"

- name: Install ansible-dev-tools in venv
  become_user: "{{ student_name }}"
  ansible.builtin.pip:
    name: "{{ ansible_dev_env_pip_packages }}"
    virtualenv: "{{ ansible_dev_env_venv_path }}"

- name: Add venv activation to .bashrc
  ansible.builtin.blockinfile:
    path: "/home/{{ student_name }}/.bashrc"
    marker: "# {mark} ANSIBLE DEV ENV"
    block: |
      if [ -z "$VIRTUAL_ENV" ]; then
        source {{ ansible_dev_env_venv_path }}/bin/activate
      fi
    owner: "{{ student_name }}"
