---
- name: Check if preferred Python is already installed
  ansible.builtin.stat:
    path: "{{ ansible_dev_env_python_bin }}"
  register: _preferred_python

- name: Install preferred Python RPMs
  when: not _preferred_python.stat.exists
  block:
    - name: Clean dnf cache before Python install
      ansible.builtin.command: dnf clean all
      changed_when: true

    - name: "Install {{ ansible_dev_env_python_package }} RPMs"
      ansible.builtin.dnf:
        name:
          - "{{ ansible_dev_env_python_package }}"
          - "{{ ansible_dev_env_python_package }}-pip"
          - "{{ ansible_dev_env_python_package }}-devel"
        state: present
      register: _python_install
      until: _python_install is not failed
      retries: 3
      delay: 30

  rescue:
    - name: Fall back to system python3
      ansible.builtin.set_fact:
        ansible_dev_env_python_bin: /usr/bin/python3
        ansible_dev_env_python_fallback: true

    - name: Ensure system python3-pip is installed
      ansible.builtin.dnf:
        name: python3-pip
        state: present
      failed_when: false

- name: Create Python virtual environment
  become_user: "{{ student_name }}"
  ansible.builtin.command:
    cmd: "{{ ansible_dev_env_python_bin }} -m venv {{ ansible_dev_env_venv_path }}"
    creates: "{{ ansible_dev_env_venv_path }}/bin/python3"

- name: Install ansible-dev-tools in venv
  become_user: "{{ student_name }}"
  ansible.builtin.pip:
    name: "{{ ansible_dev_env_pip_packages }}"
    virtualenv: "{{ ansible_dev_env_venv_path }}"

- name: Add venv activation to .bashrc
  ansible.builtin.blockinfile:
    path: "/home/{{ student_name }}/.bashrc"
    marker: "# {mark} ANSIBLE DEV ENV"
    block: |
      if [ -z "$VIRTUAL_ENV" ]; then
        source {{ ansible_dev_env_venv_path }}/bin/activate
      fi
    owner: "{{ student_name }}"
