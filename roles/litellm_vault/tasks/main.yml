---
- name: Vault-encrypt LiteLLM API URL
  ansible.builtin.command:
    cmd: ansible-vault encrypt_string --vault-password-file /dev/stdin "{{ litellm_api_endpoint }}/chat/completions" --name llm_api_url
    stdin: "{{ aap_ansible_vault_password }}"
  register: _llm_api_url_vaulted
  changed_when: false
  no_log: true

- name: Vault-encrypt LiteLLM API key
  ansible.builtin.command:
    cmd: ansible-vault encrypt_string --vault-password-file /dev/stdin "{{ litellm_virtual_key }}" --name llm_api_key
    stdin: "{{ aap_ansible_vault_password }}"
  register: _llm_api_key_vaulted
  changed_when: false
  no_log: true

- name: Set vaulted LiteLLM facts for job template extra vars
  ansible.builtin.set_fact:
    llm_api_url_vaulted: "{{ _llm_api_url_vaulted.stdout }}"
    llm_api_key_vaulted: "{{ _llm_api_key_vaulted.stdout }}"
